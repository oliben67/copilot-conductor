version: "3"

vars:
  CON_PILOT_DIR: "{{.ROOT_DIR}}/src/python/con-pilot"
  FLATPAK_DIR: "{{.CON_PILOT_DIR}}/flatpak"
  VENV: "{{.CON_PILOT_DIR}}/.venv"
  CON_PILOT: "{{.VENV}}/bin/con-pilot"
  PYTHON: "{{.VENV}}/bin/python"
  APP_ID: io.conductor.ConPilot
  BUNDLE: "{{.CON_PILOT_DIR}}/dist/io.conductor.ConPilot.flatpak"
  KEY_FILE: "{{.CON_PILOT_DIR}}/key"
  BASHRC: "{{.HOME}}/.bashrc"
  RUNTIME_VERSION: "24.08"
  UV_VERSION: "0.10.12"
  VERSION:
    sh: cat "{{.ROOT_DIR}}/VERSION" | tr -d '[:space:]'
  CONDUCTOR_HOME:
    sh: echo "${CONDUCTOR_HOME:-$HOME/.conductor}"
  CON_PILOT_HOST:
    sh: echo "${CON_PILOT_HOST:-localhost}"
  CON_PILOT_PORT:
    sh: echo "${CON_PILOT_PORT:-8000}"

env:
  CONDUCTOR_HOME: "{{.CONDUCTOR_HOME}}"
  UV_PROJECT_ENVIRONMENT: "{{.VENV}}"

tasks:
  # ── Install / Uninstall ─────────────────────────────────────────────────────

  install:
    desc: "Install the con-pilot Flatpak, configure env, start service. Pass -- --force to reinstall."
    cmds:
      - task: _install-env
      - task: _install-flatpak
      - task: _install-start
      - task: _install-show-key
      - task: _install-smoke-test

  _install-env:
    internal: true
    desc: Persist CONDUCTOR_HOME, CON_PILOT_HOST, CON_PILOT_PORT in .bashrc.
    cmds:
      - |
        persist_var() {
          local var_name="$1" var_value="$2"
          if grep -q "^export ${var_name}=" "{{.BASHRC}}" 2>/dev/null; then
            sed -i "s|^export ${var_name}=.*|export ${var_name}=\"${var_value}\"|" "{{.BASHRC}}"
          else
            printf 'export %s="%s"\n' "$var_name" "$var_value" >> "{{.BASHRC}}"
          fi
        }
        grep -q '# Conductor' "{{.BASHRC}}" 2>/dev/null || printf '\n# Conductor\n' >> "{{.BASHRC}}"
        persist_var CONDUCTOR_HOME  "{{.CONDUCTOR_HOME}}"
        persist_var CON_PILOT_HOST  "{{.CON_PILOT_HOST}}"
        persist_var CON_PILOT_PORT  "{{.CON_PILOT_PORT}}"
        echo "Environment variables persisted in {{.BASHRC}}."

        # Copy config files if CONDUCTOR_HOME differs from source
        if [[ "{{.ROOT_DIR}}" != "{{.CONDUCTOR_HOME}}" ]]; then
          mkdir -p "{{.CONDUCTOR_HOME}}"
          cp "{{.ROOT_DIR}}/conductor.yaml"             "{{.CONDUCTOR_HOME}}/conductor.yaml"
          cp "{{.ROOT_DIR}}/README.md"                  "{{.CONDUCTOR_HOME}}/README.md"
          cp "{{.ROOT_DIR}}/conduct"                    "{{.CONDUCTOR_HOME}}/conduct"
          cp "{{.ROOT_DIR}}/src/scripts/uninstall.sh"   "{{.CONDUCTOR_HOME}}/uninstall.sh"
          chmod +x "{{.CONDUCTOR_HOME}}/conduct" "{{.CONDUCTOR_HOME}}/uninstall.sh"
          # Install bash completion
          COMPLETION_DIR="$HOME/.local/share/bash-completion/completions"
          mkdir -p "$COMPLETION_DIR"
          cp "{{.ROOT_DIR}}/conduct.bash-completion" "$COMPLETION_DIR/conduct"
          echo "Copied conduct, uninstall.sh, conductor.yaml, README.md to {{.CONDUCTOR_HOME}}."
          echo "Bash completion installed to ${COMPLETION_DIR}/conduct."
        fi

  _install-flatpak:
    internal: true
    desc: Install the Flatpak bundle and forward env vars to sandbox.
    cmds:
      - |
        if [[ ! -f "{{.BUNDLE}}" ]]; then
          echo "Error: Flatpak bundle not found at {{.BUNDLE}}"
          echo "Build it first with:  task build-all"
          exit 1
        fi

        FORCE=false
        case "{{.CLI_ARGS}}" in *--force*|*-ff*) FORCE=true ;; esac

        if flatpak --user info "{{.APP_ID}}" &>/dev/null; then
          if [[ "$FORCE" == true ]]; then
            echo "Reinstalling con-pilot Flatpak…"
            flatpak --user uninstall -y "{{.APP_ID}}" 2>/dev/null || true
            rm -rf "$HOME/.var/app/{{.APP_ID}}"
            flatpak --user install --noninteractive "{{.BUNDLE}}"
          else
            echo "con-pilot Flatpak is already installed. Use -- --force to reinstall."
          fi
        else
          echo "Installing con-pilot Flatpak from {{.BUNDLE}}…"
          flatpak --user install --noninteractive "{{.BUNDLE}}"
        fi

        flatpak --user override \
          --env=CONDUCTOR_HOME="{{.CONDUCTOR_HOME}}" \
          --env=CON_PILOT_HOST="{{.CON_PILOT_HOST}}" \
          --env=CON_PILOT_PORT="{{.CON_PILOT_PORT}}" \
          "{{.APP_ID}}"
        echo "Forwarded env vars into the Flatpak sandbox."

  _install-start:
    internal: true
    desc: Start con-pilot serve and wait for health check.
    cmds:
      - |
        flatpak run "{{.APP_ID}}" serve &
        SERVER_PID=$!
        HEALTH_URL="http://{{.CON_PILOT_HOST}}:{{.CON_PILOT_PORT}}/health"
        echo "Waiting for $HEALTH_URL …"
        for i in $(seq 1 15); do
          if curl -sf "$HEALTH_URL" >/dev/null 2>&1; then
            echo "Health check passed — con-pilot is running (PID $SERVER_PID)."
            break
          fi
          if ! kill -0 "$SERVER_PID" 2>/dev/null; then
            echo "Error: con-pilot process exited unexpectedly."
            exit 1
          fi
          sleep 1
        done
        if ! curl -sf "$HEALTH_URL" >/dev/null 2>&1; then
          echo "Error: con-pilot did not become healthy after 15s."
          kill "$SERVER_PID" 2>/dev/null || true
          exit 1
        fi

  _install-show-key:
    internal: true
    desc: Display the admin key once, then shred the plaintext.
    cmds:
      - |
        if [[ -f "{{.KEY_FILE}}" ]]; then
          echo ""
          echo "ADMIN KEY (save this NOW — it will NOT be shown again): $(cat '{{.KEY_FILE}}')"
          echo ""
          # Securely erase the key file
          shred -uz "{{.KEY_FILE}}" 2>/dev/null || rm -f "{{.KEY_FILE}}"
          echo "Key file erased. Store the key in a safe place."
        else
          echo "Warning: No admin key file found at {{.KEY_FILE}}."
        fi

  _install-smoke-test:
    internal: true
    desc: Run a quick smoke test to verify the installation is healthy.
    cmds:
      - |
        BASE_URL="http://{{.CON_PILOT_HOST}}:{{.CON_PILOT_PORT}}"
        PASS=true
        echo ""
        echo "── Smoke test ──────────────────────────────────────────────"

        # 1. Health check
        HEALTH=$(curl -sf --connect-timeout 3 --max-time 5 "${BASE_URL}/health" 2>/dev/null) || true
        if [[ "$(printf '%s' "$HEALTH" | sed 's/.*"status"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')" == "ok" ]]; then
          echo "  [PASS] GET /health → ok"
        else
          echo "  [FAIL] GET /health returned: ${HEALTH:-<no response>}"
          PASS=false
        fi

        # 2. Version check
        VERSION=$(curl -sf --connect-timeout 3 --max-time 5 "${BASE_URL}/version" 2>/dev/null) || true
        VERSION_VAL=$(printf '%s' "$VERSION" | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
        if [[ -n "$VERSION_VAL" && "$VERSION_VAL" != "$VERSION" ]]; then
          echo "  [PASS] GET /version → ${VERSION_VAL}"
        else
          echo "  [FAIL] GET /version returned: ${VERSION:-<no response>}"
          PASS=false
        fi

        # 3. conduct status
        STATUS_OUT=$("{{.CONDUCTOR_HOME}}/conduct" status 2>&1) || true
        if printf '%s' "$STATUS_OUT" | grep -q 'Status:.*ok'; then
          echo "  [PASS] conduct status → $(printf '%s' "$STATUS_OUT" | tr '\n' ' ')"
        else
          echo "  [FAIL] conduct status returned: ${STATUS_OUT}"
          PASS=false
        fi

        echo "────────────────────────────────────────────────────────────"
        if [[ "$PASS" == true ]]; then
          echo "  All smoke tests passed. Installation complete."
        else
          echo "  One or more smoke tests FAILED. Check the service logs:"
          echo "    conduct logs"
          exit 1
        fi
        echo ""

  uninstall:
    desc: Stop server, remove Flatpak, clean .bashrc, remove sandbox data.
    cmds:
      - |
        echo "Uninstalling con-pilot…"

        # Stop server
        if pgrep -f 'con-pilot serve' >/dev/null 2>&1; then
          pkill -f 'con-pilot serve' || true
          echo "Stopped con-pilot serve process."
        else
          echo "No running con-pilot serve process found."
        fi

        # Remove Flatpak
        if flatpak --user info "{{.APP_ID}}" &>/dev/null; then
          flatpak --user uninstall -y "{{.APP_ID}}"
          echo "Removed Flatpak {{.APP_ID}}."
        else
          echo "Flatpak {{.APP_ID}} is not installed — skipping."
        fi

        # Clean .bashrc
        if [[ -f "{{.BASHRC}}" ]]; then
          sed -i '/^export CONDUCTOR_HOME=/d'  "{{.BASHRC}}"
          sed -i '/^export CON_PILOT_HOST=/d'  "{{.BASHRC}}"
          sed -i '/^export CON_PILOT_PORT=/d'  "{{.BASHRC}}"
          sed -i '/^# Conductor$/d'           "{{.BASHRC}}"
          echo "Removed env vars from {{.BASHRC}}."
        fi

        # Clean up venvs and sandbox data
        VENV_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/con-pilot"
        if [[ -d "$VENV_DIR" ]]; then
          rm -rf "$VENV_DIR"
          echo "Removed bootstrap venv at $VENV_DIR."
        fi

        FLATPAK_DATA="$HOME/.var/app/{{.APP_ID}}"
        if [[ -d "$FLATPAK_DATA" ]]; then
          rm -rf "$FLATPAK_DATA"
          echo "Removed Flatpak sandbox data at $FLATPAK_DATA."
        fi

        echo ""
        echo "Done. Restart your shell or run:  source {{.BASHRC}}"

  # ── Run ─────────────────────────────────────────────────────────────────────

  start:
    desc: Start con-pilot in production mode via Flatpak.
    cmds:
      - "{{.ROOT_DIR}}/conduct start {{.CLI_ARGS}}"

  # ── Deployment ──────────────────────────────────────────────────────────────

  deploy:
    desc: Install/upgrade con-pilot into the conductor venv, then (re)start the service.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - uv sync --all-groups
      - task: _restart

  _restart:
    internal: true
    desc: Kill any running con-pilot serve process and launch a fresh one.
    cmds:
      - |
        if [ -n "$(pgrep -f 'con-pilot serve')" ]; then
          echo "Stopping existing con-pilot serve process..."
          pkill -f 'con-pilot serve' || true
          sleep 1
        fi
      - |
        LOG="{{.CONDUCTOR_HOME}}/.github/scripts/sync_agents.log"
        mkdir -p "$(dirname "$LOG")"
        nohup flatpak run "{{.APP_ID}}" serve \
          >> "$LOG" 2>&1 &
        echo "con-pilot started (PID $!), logging to $LOG"

  # ── Lifecycle helpers ────────────────────────────────────────────────────────

  stop:
    desc: Stop the running con-pilot serve process.
    cmds:
      - "{{.ROOT_DIR}}/conduct stop"

  status:
    desc: Show whether con-pilot is running and which port it listens on.
    cmds:
      - "{{.ROOT_DIR}}/conduct status"

  sync:
    desc: Trigger a one-shot sync cycle against the running service.
    cmds:
      - "{{.ROOT_DIR}}/conduct sync"

  logs:
    desc: Tail the sync_agents log.
    cmds:
      - "{{.ROOT_DIR}}/conduct logs"

  # ── Build (development only — stripped from setup.sh) ───────────────────────

  lint:
    desc: Run ruff linter on con-pilot source code.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - "uv run ruff check src tests {{.CLI_ARGS}}"

  lint:fix:
    desc: Run ruff linter with auto-fix enabled.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - "uv run ruff check --fix src tests {{.CLI_ARGS}}"

  format:
    desc: Format con-pilot source code with ruff.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - "uv run ruff format src tests {{.CLI_ARGS}}"

  format:check:
    desc: Check formatting without modifying files.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - "uv run ruff format --check src tests {{.CLI_ARGS}}"

  test:bats:
    desc: Run BATS shell function tests.
    cmds:
      - bats {{.ROOT_DIR}}/src/scripts/tests/

  test:pytest:
    desc: Run the Python test suite with pytest.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - "{{.PYTHON}} -m pytest {{.CLI_ARGS}}"

  test:
    desc: Run the full test suite (pytest + BATS).
    cmds:
      - task: test:bats
      - task: test:pytest

  check:
    desc: Run all code quality checks (lint + format check + test).
    cmds:
      - task: lint
      - task: format:check
      - task: test

  build:
    desc: "Run lint, tests, build Flatpak, and package into setup.sh."
    cmds:
      - task: lint
      - task: test
      - task: flatpak
      - task: release:package

  # ── Flatpak ─────────────────────────────────────────────────────────────────

  flatpak:deps:
    desc: >
      Build the con-pilot wheel and download all dependency wheels into
      flatpak/deps/ for an offline Flatpak build.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - rm -rf flatpak/deps && mkdir -p flatpak/deps
      - uv build --wheel --out-dir flatpak/deps .
      - >-
        uv run pip download
        -d flatpak/deps
        --only-binary=:all:
        --python-version 3.14
        --abi cp314
        --platform manylinux2014_x86_64
        fastapi "uvicorn[standard]" croniter jsonschema
    sources:
      - "{{.CON_PILOT_DIR}}/pyproject.toml"
    generates:
      - "{{.CON_PILOT_DIR}}/flatpak/deps/*.whl"

  flatpak:deps:offline:
    desc: >
      Export Flatpak runtimes and download uv tarball for fully offline installation.
      Requires org.freedesktop.Platform and Sdk {{.RUNTIME_VERSION}} to be installed.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - mkdir -p dist/offline
      - |
        echo "Exporting org.freedesktop.Platform//{{.RUNTIME_VERSION}}…"
        if ! flatpak --user info org.freedesktop.Platform//{{.RUNTIME_VERSION}} &>/dev/null; then
          echo "Installing runtime from flathub first…"
          flatpak --user install -y flathub org.freedesktop.Platform//{{.RUNTIME_VERSION}}
        fi
        flatpak build-bundle \
          --runtime \
          ~/.local/share/flatpak/repo \
          dist/offline/org.freedesktop.Platform-{{.RUNTIME_VERSION}}.flatpak \
          org.freedesktop.Platform \
          {{.RUNTIME_VERSION}}
      - |
        echo "Exporting org.freedesktop.Sdk//{{.RUNTIME_VERSION}}…"
        if ! flatpak --user info org.freedesktop.Sdk//{{.RUNTIME_VERSION}} &>/dev/null; then
          echo "Installing SDK from flathub first…"
          flatpak --user install -y flathub org.freedesktop.Sdk//{{.RUNTIME_VERSION}}
        fi
        flatpak build-bundle \
          --runtime \
          ~/.local/share/flatpak/repo \
          dist/offline/org.freedesktop.Sdk-{{.RUNTIME_VERSION}}.flatpak \
          org.freedesktop.Sdk \
          {{.RUNTIME_VERSION}}
      - |
        echo "Downloading uv v{{.UV_VERSION}}…"
        curl -fsSL -o dist/offline/uv-{{.UV_VERSION}}-x86_64-unknown-linux-gnu.tar.gz \
          "https://github.com/astral-sh/uv/releases/download/{{.UV_VERSION}}/uv-x86_64-unknown-linux-gnu.tar.gz"
      - |
        echo ""
        echo "Offline dependencies exported to dist/offline/:"
        ls -lh dist/offline/
    generates:
      - "{{.CON_PILOT_DIR}}/dist/offline/org.freedesktop.Platform-{{.RUNTIME_VERSION}}.flatpak"
      - "{{.CON_PILOT_DIR}}/dist/offline/org.freedesktop.Sdk-{{.RUNTIME_VERSION}}.flatpak"
      - "{{.CON_PILOT_DIR}}/dist/offline/uv-{{.UV_VERSION}}-x86_64-unknown-linux-gnu.tar.gz"

  flatpak:build:
    desc: Build the Flatpak app image using flatpak-builder.
    dir: "{{.CON_PILOT_DIR}}"
    deps: [flatpak:deps]
    cmds:
      - mkdir -p flatpak/build-dir flatpak/repo
      - >-
        flatpak-builder
        --force-clean
        --repo=flatpak/repo
        flatpak/build-dir
        flatpak/{{.APP_ID}}.yml
    sources:
      - "{{.CON_PILOT_DIR}}/flatpak/{{.APP_ID}}.yml"
      - "{{.CON_PILOT_DIR}}/flatpak/con-pilot-launcher.sh"
      - "{{.CON_PILOT_DIR}}/flatpak/deps/*.whl"
      - "{{.CON_PILOT_DIR}}/src/**/*.py"
      - "{{.CON_PILOT_DIR}}/pyproject.toml"

  flatpak:bundle:
    desc: Generate a fresh admin key and export a self-contained .flatpak bundle to dist/.
    dir: "{{.CON_PILOT_DIR}}"
    deps: [flatpak:build]
    cmds:
      - "{{.PYTHON}} -c \"import uuid; open('key', 'w').write(str(uuid.uuid4()))\""
      - echo "Generated new admin key at $(pwd)/key"
      - mkdir -p dist
      - flatpak build-bundle flatpak/repo dist/io.conductor.ConPilot.flatpak io.conductor.ConPilot
      - echo "Bundle written to dist/io.conductor.ConPilot.flatpak"

  flatpak:bundle:full:
    desc: "[DISABLED] Full standalone Flatpak build with offline dependencies - includes runtime bundles."
    preconditions:
      - sh: "false"
        msg: "flatpak:bundle:full is currently disabled."
    cmds:
      - task: flatpak:deps
      - task: flatpak:deps:offline
      - "{{.PYTHON}} -c \"import uuid; open('key', 'w').write(str(uuid.uuid4()))\""
      - echo "Generated new admin key at $(pwd)/key"
      - rm -rf flatpak/build-dir flatpak/repo
      - mkdir -p flatpak/build-dir flatpak/repo dist
      - >-
        flatpak-builder
        --force-clean
        --repo=flatpak/repo
        flatpak/build-dir
        flatpak/{{.APP_ID}}.yml
      - flatpak build-bundle flatpak/repo dist/{{.APP_ID}}.flatpak {{.APP_ID}}
      - echo "Full bundle written to dist/{{.APP_ID}}.flatpak"
      - echo "Offline deps available in dist/offline/"

  flatpak:run:
    desc: Run the installed Flatpak (pass extra args via CLI_ARGS).
    cmds:
      - flatpak run --env=CONDUCTOR_HOME={{.CONDUCTOR_HOME}} {{.APP_ID}} {{.CLI_ARGS}}

  flatpak:clean:
    desc: Remove Flatpak build artefacts (keeps downloaded deps cache).
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - rm -rf flatpak/build-dir flatpak/repo dist/{{.APP_ID}}.flatpak

  flatpak:clean:all:
    desc: Remove all Flatpak artefacts including the deps wheel cache.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - rm -rf flatpak/build-dir flatpak/repo flatpak/deps dist/io.conductor.ConPilot.flatpak

  flatpak:
    desc: "Full Flatpak pipeline: deps → build → bundle."
    cmds:
      - task: flatpak:deps
      - task: flatpak:build
      - task: flatpak:bundle

  flatpak:force:
    desc: "Clean all artefacts and rebuild from scratch: clean → deps → build → bundle."
    cmds:
      - task: flatpak:clean:all
      - task: flatpak:deps
      - task: flatpak:build
      - task: flatpak:bundle

  build-all:
    desc: "Build everything. Pass -- --force to rebuild, -- --release to bump version and package setup.sh."
    cmds:
      - task: check
      - |
        FORCE=false
        RELEASE=false
        case "{{.CLI_ARGS}}" in
          *--force*|*-f*) FORCE=true ;;
        esac
        case "{{.CLI_ARGS}}" in
          *--release*) RELEASE=true ;;
        esac

        if [[ "$FORCE" == true ]]; then
          task flatpak:force
        else
          task flatpak
        fi

        if [[ "$RELEASE" == true ]]; then
          task release:bump
          task release:package
        fi

  # ── Release ─────────────────────────────────────────────────────────────────

  release:bump:
    desc: Bump the patch version in VERSION.
    cmds:
      - |
        V="$(cat '{{.ROOT_DIR}}/VERSION' | tr -d '[:space:]')"
        MAJOR="${V%%.*}"
        REST="${V#*.}"
        MINOR="${REST%%.*}"
        PATCH="${REST#*.}"
        NEW_PATCH=$((PATCH + 1))
        NEW_V="${MAJOR}.${MINOR}.${NEW_PATCH}"
        printf '%s\n' "$NEW_V" > "{{.ROOT_DIR}}/VERSION"
        echo "Version bumped: ${V} → ${NEW_V}"

  release:package:
    desc: Package minimal deployment into a self-extracting setup.sh.
    cmds:
      - |
        set -e
        VERSION="$(cat '{{.ROOT_DIR}}/VERSION' | tr -d '[:space:]')"
        BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        DIST_DIR="{{.ROOT_DIR}}/dist"
        mkdir -p "$DIST_DIR"

        echo "Packaging Conductor v${VERSION}…"

        # Strip "Running the tests" section from README for deployment
        DEPLOY_README="$(mktemp)"
        sed '/^## Running the tests/,$d' "{{.ROOT_DIR}}/README.md" > "$DEPLOY_README"
        sed -i '${/^---$/d;}' "$DEPLOY_README"

        # Create payload tarball with only essential files
        PAYLOAD="$(mktemp)"
        STAGING="$(mktemp -d)"
        mkdir -p "$STAGING/conductor/python/con-pilot/dist"

        cp "{{.ROOT_DIR}}/conduct"              "$STAGING/conductor/"
        cp "{{.ROOT_DIR}}/conduct.bash-completion" "$STAGING/conductor/"
        cp "{{.ROOT_DIR}}/VERSION"              "$STAGING/conductor/"
        cp "$DEPLOY_README"                     "$STAGING/conductor/README.md"
        cp "{{.ROOT_DIR}}/src/scripts/uninstall.sh"         "$STAGING/conductor/"
        cp "{{.ROOT_DIR}}/conductor.yaml"       "$STAGING/conductor/"
        cp "{{.CON_PILOT_DIR}}/dist/io.conductor.ConPilot.flatpak" "$STAGING/conductor/python/con-pilot/dist/"

        tar czf "$PAYLOAD" -C "$STAGING" conductor
        rm -rf "$STAGING" "$DEPLOY_README"

        # Build setup.sh = header (with inlined shared functions + substitutions) + archive payload
        SETUP="${DIST_DIR}/setup-${VERSION}.sh"
        CP_VERSION=$(grep -m1 '^version' '{{.CON_PILOT_DIR}}/pyproject.toml' | sed 's/.*"\(.*\)"/\1/')
        TMPHEADER="$(mktemp)"
        while IFS= read -r line; do
          if [[ "$line" == "# __FUNCTIONS__" ]]; then
            cat '{{.ROOT_DIR}}/src/scripts/setup.sh.functions'
          else
            printf '%s\n' "$line"
          fi
        done < '{{.ROOT_DIR}}/src/scripts/setup.sh.header' > "$TMPHEADER"
        sed \
          -e "s|__VERSION__|${VERSION}|g" \
          -e "s|__CON_PILOT_VERSION__|${CP_VERSION}|g" \
          -e "s|__BUILD_DATE__|${BUILD_DATE}|g" \
          "$TMPHEADER" > "$SETUP"
        rm -f "$TMPHEADER"
        cat "$PAYLOAD" >> "$SETUP"
        chmod +x "$SETUP"
        rm -f "$PAYLOAD"

        SIZE="$(du -h "$SETUP" | cut -f1)"
        echo "Created ${SETUP} (${SIZE})"

  release:package:deps-bundled:
    desc: Package full Flatpak bundle with offline dependencies into setup-VERSION-full-bundle.sh.
    cmds:
      - |
        set -e
        VERSION="$(cat '{{.ROOT_DIR}}/VERSION' | tr -d '[:space:]')"
        BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        DIST_DIR="{{.ROOT_DIR}}/dist"
        mkdir -p "$DIST_DIR"

        echo "Packaging Conductor v${VERSION} (full offline bundle)…"

        # Strip "Running the tests" section from README for deployment
        DEPLOY_README="$(mktemp)"
        sed '/^## Running the tests/,$d' "{{.ROOT_DIR}}/README.md" > "$DEPLOY_README"
        sed -i '${/^---$/d;}' "$DEPLOY_README"

        # Create payload tarball with essential files AND offline dependencies
        PAYLOAD="$(mktemp)"
        STAGING="$(mktemp -d)"
        mkdir -p "$STAGING/conductor/python/con-pilot/dist/offline"

        cp "{{.ROOT_DIR}}/conduct"              "$STAGING/conductor/"
        cp "{{.ROOT_DIR}}/conduct.bash-completion" "$STAGING/conductor/"
        cp "{{.ROOT_DIR}}/VERSION"              "$STAGING/conductor/"
        cp "$DEPLOY_README"                     "$STAGING/conductor/README.md"
        cp "{{.ROOT_DIR}}/src/scripts/uninstall.sh"         "$STAGING/conductor/"
        cp "{{.ROOT_DIR}}/conductor.yaml"       "$STAGING/conductor/"
        cp "{{.CON_PILOT_DIR}}/dist/io.conductor.ConPilot.flatpak" "$STAGING/conductor/python/con-pilot/dist/"

        # Include offline dependencies (Platform, Sdk, uv)
        cp "{{.CON_PILOT_DIR}}/dist/offline/"* "$STAGING/conductor/python/con-pilot/dist/offline/"

        tar czf "$PAYLOAD" -C "$STAGING" conductor
        rm -rf "$STAGING" "$DEPLOY_README"

        # Build setup.sh = header.full (with inlined shared functions + substitutions) + archive payload
        SETUP="${DIST_DIR}/setup-${VERSION}-full-bundle.sh"
        CP_VERSION=$(grep -m1 '^version' '{{.CON_PILOT_DIR}}/pyproject.toml' | sed 's/.*"\(.*\)"/\1/')
        TMPHEADER="$(mktemp)"
        while IFS= read -r line; do
          if [[ "$line" == "# __FUNCTIONS__" ]]; then
            cat '{{.ROOT_DIR}}/src/scripts/setup.sh.functions'
          else
            printf '%s\n' "$line"
          fi
        done < '{{.ROOT_DIR}}/src/scripts/setup.sh.header.full' > "$TMPHEADER"
        sed \
          -e "s|__VERSION__|${VERSION}|g" \
          -e "s|__CON_PILOT_VERSION__|${CP_VERSION}|g" \
          -e "s|__BUILD_DATE__|${BUILD_DATE}|g" \
          -e "s|__RUNTIME_VERSION__|{{.RUNTIME_VERSION}}|g" \
          -e "s|__UV_VERSION__|{{.UV_VERSION}}|g" \
          "$TMPHEADER" > "$SETUP"
        rm -f "$TMPHEADER"
        cat "$PAYLOAD" >> "$SETUP"
        chmod +x "$SETUP"
        rm -f "$PAYLOAD"

        SIZE="$(du -h "$SETUP" | cut -f1)"
        echo "Created ${SETUP} (${SIZE})"
        echo "Includes offline dependencies: Platform, Sdk, uv"

  release:
    desc: "Build setup file, create releases/v[version]/ directory, and generate release notes."
    cmds:
      - task: flatpak:bundle
      - task: release:package
      - |
        set -e
        VERSION="$(cat '{{.ROOT_DIR}}/VERSION' | tr -d '[:space:]')"
        RELEASES_DIR="{{.ROOT_DIR}}/releases/v${VERSION}"
        mkdir -p "$RELEASES_DIR"

        # Copy setup file to versioned releases folder
        cp "{{.ROOT_DIR}}/dist/setup-${VERSION}.sh" "$RELEASES_DIR/"

        # Generate release notes from template
        RELEASE_DATE="$(date '+%B %d, %Y')"
        NOTES_FILE="$RELEASES_DIR/release-notes-${VERSION}.md"
        TEMPLATE="{{.ROOT_DIR}}/src/scripts/release-notes.template.md"

        sed -e "s/__VERSION__/${VERSION}/g" \
            -e "s/__RELEASE_DATE__/${RELEASE_DATE}/g" \
            "$TEMPLATE" > "$NOTES_FILE"

        echo ""
        echo "Release v${VERSION} artifacts saved to releases/v${VERSION}/:"
        ls -lh "$RELEASES_DIR/"
        echo ""
        echo "NOTE: Edit $NOTES_FILE to add version-specific changes."

  release-all:
    desc: "Build both standard and full-bundle setup files, create releases/v[version]/ directory, and generate release notes."
    cmds:
      - task: flatpak:bundle:full
      - task: release:package
      - task: release:package:deps-bundled
      - |
        set -e
        VERSION="$(cat '{{.ROOT_DIR}}/VERSION' | tr -d '[:space:]')"
        RELEASES_DIR="{{.ROOT_DIR}}/releases/v${VERSION}"
        mkdir -p "$RELEASES_DIR"

        # Copy both setup files to versioned releases folder
        cp "{{.ROOT_DIR}}/dist/setup-${VERSION}.sh" "$RELEASES_DIR/"
        cp "{{.ROOT_DIR}}/dist/setup-${VERSION}-full-bundle.sh" "$RELEASES_DIR/"

        # Generate release notes from template
        RELEASE_DATE="$(date '+%B %d, %Y')"
        NOTES_FILE="$RELEASES_DIR/release-notes-${VERSION}.md"
        TEMPLATE="{{.ROOT_DIR}}/src/scripts/release-notes-full.template.md"

        sed -e "s/__VERSION__/${VERSION}/g" \
            -e "s/__RELEASE_DATE__/${RELEASE_DATE}/g" \
            "$TEMPLATE" > "$NOTES_FILE"

        echo ""
        echo "Release v${VERSION} artifacts saved to releases/v${VERSION}/:"
        ls -lh "$RELEASES_DIR/"
        echo ""
        echo "NOTE: Edit $NOTES_FILE to add version-specific changes."
