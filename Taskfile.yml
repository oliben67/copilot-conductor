version: "3"

vars:
  CON_PILOT_DIR: "{{.ROOT_DIR}}/src/python/con-pilot"
  VENV: "{{.CON_PILOT_DIR}}/.venv"
  CON_PILOT: "{{.VENV}}/bin/con-pilot"
  PYTHON: "{{.VENV}}/bin/python"
  APPIMAGE_DIR: "{{.CON_PILOT_DIR}}/appimage"
  APPIMAGETOOL_VERSION: "continuous"
  BASHRC: "{{.HOME}}/.bashrc"
  UV_VERSION: "0.10.12"
  PYTHON_VERSION:
    sh: cat "{{.ROOT_DIR}}/src/python/con-pilot/.python-version" | tr -d '[:space:]'
  PYTHON_VER_DOTLESS:
    sh: echo "${PYTHON_VERSION//./}"
  # Bundled release version is pegged to con-pilot
  # CONDUCTOR_ENV is empty for production builds and "-dev" for dev builds
  # (set via the environment by `task release:dev`). It is appended to the
  # VERSION filename below so dev builds read VERSION-dev instead of VERSION.
  CONDUCTOR_ENV:
    sh: echo "${CONDUCTOR_ENV:-}"
  VERSION:
    sh: cat "{{.ROOT_DIR}}/src/python/con-pilot/VERSION{{.CONDUCTOR_ENV}}" | tr -d '[:space:]'
  # Per-application versions
  CONDUCTOR_CLI_VERSION:
    sh: cat "{{.ROOT_DIR}}/src/conduct-cli/VERSION{{.CONDUCTOR_ENV}}" | tr -d '[:space:]'
  CONDUCTOR_HOME_VERSION:
    sh: cat "{{.ROOT_DIR}}/src/vscode/conduct-lectern/VERSION{{.CONDUCTOR_ENV}}" 2>/dev/null | tr -d '[:space:]' || echo "0.0.0"
  APPIMAGE_BUNDLE: "{{.CON_PILOT_DIR}}/dist/con-pilot-{{.VERSION}}-x86_64.AppImage"
  CONDUCTOR_HOME:
    sh: echo "${CONDUCTOR_HOME:-$HOME/.conductor}"
  CON_PILOT_HOST:
    sh: echo "${CON_PILOT_HOST:-localhost}"
  CON_PILOT_PORT:
    sh: echo "${CON_PILOT_PORT:-8000}"

env:
  CONDUCTOR_HOME: "{{.CONDUCTOR_HOME}}"
  UV_PROJECT_ENVIRONMENT: "{{.VENV}}"

tasks:
  # ── Install / Uninstall ─────────────────────────────────────────────────────

  install:
    desc: "Install con-pilot AppImage, configure env, start service. Pass -- --force to reinstall."
    cmds:
      - task: _install-env
      - task: _install-appimage
      - task: _install-start
      - task: _install-smoke-test
      - task: _install-show-key

  _install-env:
    internal: true
    desc: Persist CONDUCTOR_HOME, CON_PILOT_HOST, CON_PILOT_PORT in .bashrc.
    cmds:
      - |
        persist_var() {
          local var_name="$1" var_value="$2"
          if grep -q "^export ${var_name}=" "{{.BASHRC}}" 2>/dev/null; then
            sed -i "s|^export ${var_name}=.*|export ${var_name}=\"${var_value}\"|" "{{.BASHRC}}"
          else
            printf 'export %s="%s"\n' "$var_name" "$var_value" >> "{{.BASHRC}}"
          fi
        }
        grep -q '# Conductor' "{{.BASHRC}}" 2>/dev/null || printf '\n# Conductor\n' >> "{{.BASHRC}}"
        persist_var CONDUCTOR_HOME  "{{.CONDUCTOR_HOME}}"
        persist_var CON_PILOT_HOST  "{{.CON_PILOT_HOST}}"
        persist_var CON_PILOT_PORT  "{{.CON_PILOT_PORT}}"
        echo "Environment variables persisted in {{.BASHRC}}."

        # Copy config files if CONDUCTOR_HOME differs from source
        if [[ "{{.ROOT_DIR}}" != "{{.CONDUCTOR_HOME}}" ]]; then
          mkdir -p "{{.CONDUCTOR_HOME}}"
          cp "{{.ROOT_DIR}}/conductor.yaml"             "{{.CONDUCTOR_HOME}}/conductor.yaml"
          cp "{{.ROOT_DIR}}/README.md"                  "{{.CONDUCTOR_HOME}}/README.md"
          cp "{{.ROOT_DIR}}/conduct"                    "{{.CONDUCTOR_HOME}}/conduct"
          cp "{{.ROOT_DIR}}/src/conduct-cli/uninstall-conductor.sh"   "{{.CONDUCTOR_HOME}}/uninstall-conductor.sh"
          chmod +x "{{.CONDUCTOR_HOME}}/conduct" "{{.CONDUCTOR_HOME}}/uninstall-conductor.sh"
          rsync -a --exclude='.not-deployed' "{{.ROOT_DIR}}/.github/" "{{.CONDUCTOR_HOME}}/.github/"
          # Install bash completion
          COMPLETION_DIR="$HOME/.local/share/bash-completion/completions"
          mkdir -p "$COMPLETION_DIR"
          cp "{{.ROOT_DIR}}/conduct.bash-completion" "$COMPLETION_DIR/conduct"
          echo "Copied conduct, uninstall-conductor.sh, conductor.yaml, README.md to {{.CONDUCTOR_HOME}}."
          echo "Bash completion installed to ${COMPLETION_DIR}/conduct."
        fi

  _install-appimage:
    internal: true
    desc: Install AppImage, inject fresh admin key into payload, and keep key only in temp storage.
    cmds:
      - |
        APPIMAGE="{{.APPIMAGE_BUNDLE}}"
        if [[ ! -f "$APPIMAGE" ]]; then
          echo "Error: AppImage not found at ${APPIMAGE}"
          echo "Build it first with:  task appimage:build"
          exit 1
        fi

        FORCE=false
        case "{{.CLI_ARGS}}" in *--force*|*-ff*) FORCE=true ;; esac

        DEST="{{.CONDUCTOR_HOME}}/con-pilot.AppImage"

        # Detect dev/prod mismatch between the currently-deployed AppImage and
        # the one we're about to install. If the kinds differ, force a fresh
        # install so the deployed payload (key file vs `dev` marker) matches
        # the build mode.
        if [[ -f "$DEST" ]] && [[ "$FORCE" != true ]]; then
          PROBE_DIR="$(mktemp -d)"
          ( cd "$PROBE_DIR" && "$DEST" --appimage-extract >/dev/null 2>&1 ) || true
          DEPLOYED_IS_DEV=false
          [[ -f "$PROBE_DIR/squashfs-root/dev" ]] && DEPLOYED_IS_DEV=true
          rm -rf "$PROBE_DIR"
          BUILDING_DEV=false
          [[ "{{.CONDUCTOR_ENV}}" == "-dev" ]] && BUILDING_DEV=true
          if [[ "$DEPLOYED_IS_DEV" != "$BUILDING_DEV" ]]; then
            echo "Deployed AppImage kind (dev=$DEPLOYED_IS_DEV) differs from current build (dev=$BUILDING_DEV); reinstalling."
            FORCE=true
          fi
        fi

        if [[ -f "$DEST" ]] && [[ "$FORCE" != true ]]; then
          echo "con-pilot AppImage is already installed at $DEST. Use -- --force to reinstall."
        else
          KEY="$(python3 -c "import uuid; print(uuid.uuid4())")"
          TMPDIR="$(mktemp -d)"
          cleanup() {
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT

          cp "$APPIMAGE" "$DEST"
          chmod +x "$DEST"

          # Extract deployed AppImage, inject key at AppDir root, and repack with appimagetool.
          (
            cd "$TMPDIR"
            "$DEST" --appimage-extract >/dev/null
          )
          APPDIR_SRC="$TMPDIR/squashfs-root"
          if [[ ! -d "$APPDIR_SRC" ]]; then
            echo "Error: failed to extract AppImage payload from $DEST"
            exit 1
          fi

          printf '%s\n' "$KEY" > "$APPDIR_SRC/key"
          chmod 600 "$APPDIR_SRC/key"

          TOOL="{{.CON_PILOT_DIR}}/appimage/tools/appimagetool-x86_64.AppImage"
          if [[ ! -f "$TOOL" ]]; then
            mkdir -p "{{.CON_PILOT_DIR}}/appimage/tools"
            echo "Downloading appimagetool ({{.APPIMAGETOOL_VERSION}})…"
            curl -fsSL -o "$TOOL" \
              "https://github.com/AppImage/AppImageKit/releases/download/{{.APPIMAGETOOL_VERSION}}/appimagetool-x86_64.AppImage"
            chmod +x "$TOOL"
          fi
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 "$TOOL" "$APPDIR_SRC" "$DEST"
          chmod +x "$DEST"

          # Ensure no host-side key file persists in CONDUCTOR_HOME.
          rm -f "{{.CONDUCTOR_HOME}}/key"

          echo "Installed AppImage to $DEST."
        fi

  _install-start:
    internal: true
    desc: Start con-pilot serve and wait for health check.
    cmds:
      - |
        LOG="{{.CONDUCTOR_HOME}}/con-pilot.log"
        # Stop any existing instance
        pkill -f "con-pilot.*serve" 2>/dev/null || true
        sleep 1
        CON_PILOT_DEV_SHOW_ME=1 setsid "{{.CONDUCTOR_HOME}}/con-pilot.AppImage" serve >> "$LOG" 2>&1 &
        SERVER_PID=$!
        API_PREFIX="/${CON_PILOT_API_BASE:-api}/${CON_PILOT_API_VERSION:-v1}"
        HEALTH_URL="http://{{.CON_PILOT_HOST}}:{{.CON_PILOT_PORT}}${API_PREFIX}/health"
        LEGACY_HEALTH_URL="http://{{.CON_PILOT_HOST}}:{{.CON_PILOT_PORT}}/health"
        echo "Waiting for $HEALTH_URL …"
        for i in $(seq 1 20); do
          if curl -sf "$HEALTH_URL" >/dev/null 2>&1 || curl -sf "$LEGACY_HEALTH_URL" >/dev/null 2>&1; then
            echo "Health check passed — con-pilot is running. Logs: $LOG"
            break
          fi
          # The AppImage launcher forks and exits; check for the spawned con-pilot process
          if [[ $i -gt 5 ]] && ! pgrep -f "con-pilot serve" >/dev/null 2>&1; then
            echo "Error: con-pilot process exited unexpectedly. Check $LOG"
            exit 1
          fi
          sleep 1
        done
        if ! curl -sf "$HEALTH_URL" >/dev/null 2>&1 && ! curl -sf "$LEGACY_HEALTH_URL" >/dev/null 2>&1; then
          echo "Error: con-pilot did not become healthy after 20s. Check $LOG"
          exit 1
        fi

  _install-show-key:
    internal: true
    desc: Display admin key once after successful install by reading it from AppImage payload.
    cmds:
      - |
        # Decide dev vs prod from build-time CONDUCTOR_ENV (set by `task release:dev`),
        # not from the deployed AppImage payload — a stale dev AppImage left in
        # CONDUCTOR_HOME from a previous `task install:dev` must not make a
        # production install print "dev build detected".
        if [[ "{{.CONDUCTOR_ENV}}" == "-dev" ]]; then
          echo "Skipping admin-key display: dev build (CONDUCTOR_ENV=-dev)."
          exit 0
        fi

        DEST="{{.CONDUCTOR_HOME}}/con-pilot.AppImage"
        TMPDIR="$(mktemp -d)"
        cleanup() {
          rm -rf "$TMPDIR"
        }
        trap cleanup EXIT

        (
          cd "$TMPDIR"
          "$DEST" --appimage-extract >/dev/null
        )
        KEY_FILE="$TMPDIR/squashfs-root/key"

        if [[ -f "$KEY_FILE" ]]; then
          echo ""
          echo "+---------------------------------------------------------------------+"
          echo "+  ADMIN KEY (shown ONLY ONCE): $(cat "$KEY_FILE")  +"
          echo "+---------------------------------------------------------------------+"
          echo ""
        else
          echo "Warning: no embedded admin key found in $DEST"
        fi

  _install-smoke-test:
    internal: true
    desc: Run a quick smoke test to verify the installation is healthy.
    cmds:
      - |
        BASE_URL="http://{{.CON_PILOT_HOST}}:{{.CON_PILOT_PORT}}"
        API_PREFIX="/${CON_PILOT_API_BASE:-api}/${CON_PILOT_API_VERSION:-v1}"
        PASS=true
        echo ""
        echo "── Smoke test ──────────────────────────────────────────────"

        # 1. Health check
        HEALTH=$(curl -sf --connect-timeout 3 --max-time 5 "${BASE_URL}${API_PREFIX}/health" 2>/dev/null) || \
          HEALTH=$(curl -sf --connect-timeout 3 --max-time 5 "${BASE_URL}/health" 2>/dev/null) || true
        if [[ "$(printf '%s' "$HEALTH" | sed 's/.*"status"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')" == "ok" ]]; then
          echo "  [PASS] GET ${API_PREFIX}/health → ok"
        else
          echo "  [FAIL] GET ${API_PREFIX}/health returned: ${HEALTH:-<no response>}"
          PASS=false
        fi

        # 2. Version check
        VERSION=$(curl -sf --connect-timeout 3 --max-time 5 "${BASE_URL}${API_PREFIX}/version" 2>/dev/null) || \
          VERSION=$(curl -sf --connect-timeout 3 --max-time 5 "${BASE_URL}/version" 2>/dev/null) || true
        VERSION_VAL=$(printf '%s' "$VERSION" | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
        if [[ -n "$VERSION_VAL" && "$VERSION_VAL" != "$VERSION" ]]; then
          echo "  [PASS] GET ${API_PREFIX}/version → ${VERSION_VAL}"
        else
          echo "  [FAIL] GET ${API_PREFIX}/version returned: ${VERSION:-<no response>}"
          PASS=false
        fi

        # 3. conduct status
        STATUS_OUT=$("{{.CONDUCTOR_HOME}}/conduct" status 2>&1) || true
        if printf '%s' "$STATUS_OUT" | grep -q 'Status:.*ok'; then
          echo "  [PASS] conduct status → $(printf '%s' "$STATUS_OUT" | tr '\n' ' ')"
        else
          echo "  [FAIL] conduct status returned: ${STATUS_OUT}"
          PASS=false
        fi

        echo "────────────────────────────────────────────────────────────"
        if [[ "$PASS" == true ]]; then
          echo "  All smoke tests passed. Installation complete."
        else
          echo "  One or more smoke tests FAILED. Check the service logs:"
          echo "    conduct logs"
          exit 1
        fi
        echo ""

  setup-home:
    desc: "Deploy conductor.yaml, conduct CLI, README, and .github/ into CONDUCTOR_HOME (no AppImage). Useful when running con-pilot from source under the debugger."
    cmds:
      - task: _install-env

  setup-clean-home:
    desc: "Remove deployed conductor.yaml, conduct CLI, README, and .github/ from CONDUCTOR_HOME."
    cmds:
      - task: clean
      - task: setup-home

  uninstall:
    desc: Stop server, remove AppImage, clean .bashrc, remove venv data.
    cmds:
      - |
        echo "Uninstalling con-pilot…"

        # Stop server
        if pgrep -f 'con-pilot serve' >/dev/null 2>&1; then
          pkill -f 'con-pilot serve' || true
          echo "Stopped con-pilot serve process."
        else
          echo "No running con-pilot serve process found."
        fi

        # Remove AppImage
        APPIMAGE="{{.CONDUCTOR_HOME}}/con-pilot.AppImage"
        if [[ -f "$APPIMAGE" ]]; then
          rm -f "$APPIMAGE"
          echo "Removed AppImage at $APPIMAGE."
        fi

        # Clean .bashrc
        if [[ -f "{{.BASHRC}}" ]]; then
          sed -i '/^export CONDUCTOR_HOME=/d'  "{{.BASHRC}}"
          sed -i '/^export CON_PILOT_HOST=/d'  "{{.BASHRC}}"
          sed -i '/^export CON_PILOT_PORT=/d'  "{{.BASHRC}}"
          sed -i '/^# Conductor$/d'           "{{.BASHRC}}"
          echo "Removed env vars from {{.BASHRC}}."
        fi

        # Clean up bootstrap venv data
        VENV_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/con-pilot"
        if [[ -d "$VENV_DIR" ]]; then
          rm -rf "$VENV_DIR"
          echo "Removed bootstrap venv at $VENV_DIR."
        fi

        echo ""
        echo "Done. Restart your shell or run:  source {{.BASHRC}}"

  # ── Run ─────────────────────────────────────────────────────────────────────

  start:
    desc: Start con-pilot in production mode via AppImage.
    cmds:
      - "{{.ROOT_DIR}}/conduct start {{.CLI_ARGS}}"

  # ── Deployment ──────────────────────────────────────────────────────────────

  deploy:
    desc: "Full prod pipeline: build → release → install."
    cmds:
      - task: build
      - task: release
      - task: install

  deploy:dev:
    desc: "Full dev pipeline: build:dev → release:dev → install:dev."
    cmds:
      - task: build:dev
      - task: release:dev
      - task: install:dev

  _deploy-sync-cli:
    internal: true
    desc: Sync the latest conduct CLI script to CONDUCTOR_HOME.
    cmds:
      - |
        mkdir -p "{{.CONDUCTOR_HOME}}"
        cp "{{.ROOT_DIR}}/conduct" "{{.CONDUCTOR_HOME}}/conduct"
        chmod +x "{{.CONDUCTOR_HOME}}/conduct"
        echo "Updated {{.CONDUCTOR_HOME}}/conduct from repo source."

  _restart:
    internal: true
    desc: Kill any running con-pilot serve process and launch a fresh one.
    cmds:
      - |
        if [ -n "$(pgrep -f 'con-pilot serve')" ]; then
          echo "Stopping existing con-pilot serve process..."
          pkill -f 'con-pilot serve' || true
          sleep 1
        fi
      - |
        LOG="{{.CONDUCTOR_HOME}}/con-pilot.log"
        CON_PILOT_DEV_SHOW_ME=1 setsid "{{.CONDUCTOR_HOME}}/con-pilot.AppImage" serve \
          >> "$LOG" 2>&1 &
        echo "con-pilot started (PID $!), logging to $LOG"

  # ── Lifecycle helpers ────────────────────────────────────────────────────────

  clean:
    desc: Stop every running con-pilot instance (AppImage + python module + debugpy listener) and prepare the system for a clean start.
    cmds:
      - "{{.ROOT_DIR}}/.vscode/clean.sh"

  stop:
    desc: Stop the running con-pilot serve process.
    cmds:
      - "{{.ROOT_DIR}}/conduct stop"

  status:
    desc: Show whether con-pilot is running and which port it listens on.
    cmds:
      - "{{.ROOT_DIR}}/conduct status"

  sync:
    desc: Trigger a one-shot sync cycle against the running service.
    cmds:
      - "{{.ROOT_DIR}}/conduct sync"

  logs:
    desc: Tail the con-pilot log.
    cmds:
      - "{{.ROOT_DIR}}/conduct logs"

  # ── Build (development only — stripped from setup.sh) ───────────────────────

  lint:
    desc: Run ruff linter on con-pilot source code.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - "uv run ruff check src tests {{.CLI_ARGS}}"

  lint:fix:
    desc: Run ruff linter with auto-fix enabled.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - "uv run ruff check --fix src tests {{.CLI_ARGS}}"

  format:
    desc: Format con-pilot source code with ruff.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - "uv run ruff format src tests {{.CLI_ARGS}}"

  format:check:
    desc: Check formatting without modifying files.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - "uv run ruff format --check src tests {{.CLI_ARGS}}"

  test:bats:
    desc: Run BATS shell function tests.
    cmds:
      - bats {{.ROOT_DIR}}/src/conduct-cli/tests/

  test:pytest:
    desc: Run the Python test suite with pytest.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - "{{.PYTHON}} -m pytest {{.CLI_ARGS}}"

  test:
    desc: Run the full test suite (pytest + BATS).
    cmds:
      - task: test:bats
      - task: test:pytest

  check:
    desc: Run all code quality checks (lint + format check + test).
    cmds:
      - task: lint
      - task: format:check
      - task: test

  build:
    desc: "Run lint and tests. Run `task release` separately to package artefacts."
    env:
      # Force a production build regardless of any inherited CONDUCTOR_ENV
      # (e.g. left over from a prior `task release:dev`). Sub-tasks invoked
      # via `task:` inherit this environment.
      CONDUCTOR_ENV: ""
    cmds:
      - task: lint
      - task: test

  # ── Lectern (VS Code Extension) ──────────────────────────────────────────────

  lectern:package:
    desc: "Build and package the conduct-lectern VS Code extension as a .vsix."
    cmds:
      - |
        VSIX="{{.ROOT_DIR}}/releases/v{{.VERSION}}/conduct-lectern-{{.CONDUCTOR_HOME_VERSION}}.vsix"
        if [[ -f "$VSIX" ]]; then
          echo "VSIX already exists at $VSIX; skipping rebuild."
        else
          cd "{{.ROOT_DIR}}/src/vscode/conduct-lectern" && task package
        fi

  # ── AppImage ─────────────────────────────────────────────────────────────────

  appimage:deps:
    desc: >
      Build the con-pilot wheel and download all dependency wheels into
      appimage/deps/ for an offline AppImage build. Set CON_PILOT_INCLUDE_DEV=1
      to also bundle the `dev` dependency group (debugpy, jupyter, pytest,
      ruff) \u2014 used for dev-build AppImages.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - rm -rf appimage/deps && mkdir -p appimage/deps
      - uv build --wheel --out-dir appimage/deps .
      - |
        WHEEL="$(echo appimage/deps/con_pilot-*.whl)"
        uv run --with pip pip download \
          -d appimage/deps \
          "$WHEEL" \
          setuptools \
          wheel
      - |
        if [[ "${CON_PILOT_INCLUDE_DEV:-}" == "1" ]]; then
          echo "Including dev dependency group in AppImage wheels\u2026"
          DEV_REQS="$(mktemp)"
          uv export \
            --only-group dev \
            --no-emit-project \
            --no-hashes \
            --format requirements-txt \
            > "$DEV_REQS"
          uv run --with pip pip download \
            -d appimage/deps \
            -r "$DEV_REQS"
          rm -f "$DEV_REQS"
        fi
    sources:
      - "{{.CON_PILOT_DIR}}/pyproject.toml"
      - "{{.CON_PILOT_DIR}}/VERSION"
      - "{{.CON_PILOT_DIR}}/src/**/*.py"
    generates:
      - "{{.CON_PILOT_DIR}}/appimage/deps/*.whl"

  _appimage-appdir:
    internal: true
    desc: Build the AppDir structure (AppRun, desktop, icon, uv binary, wheels).
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - |
        set -e
        APPDIR="appimage/AppDir"
        rm -rf "$APPDIR"
        mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/con-pilot/wheels"

        # AppRun entry point
        cp appimage/AppRun "$APPDIR/AppRun"
        chmod +x "$APPDIR/AppRun"

        # Desktop entry
        cp appimage/io.conductor.ConPilot.desktop "$APPDIR/io.conductor.ConPilot.desktop"

        # Icon — try ImageMagick, fall back to a minimal valid PNG
        if command -v convert >/dev/null 2>&1; then
          convert -size 256x256 xc:'#2d2d2d' \
            -fill white -font DejaVu-Sans-Bold -pointsize 56 \
            -gravity center -annotate 0 "CP" \
            "$APPDIR/io.conductor.ConPilot.png" 2>/dev/null || true
        fi
        if [[ ! -f "$APPDIR/io.conductor.ConPilot.png" ]]; then
          # Minimal 1×1 transparent PNG (base64-encoded)
          python3 -c "
        import base64, sys
        sys.stdout.buffer.write(base64.b64decode(
          'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12NgAAIABQ'
          'AABjkB6QAAAABJRU5ErkJggg=='
        ))" > "$APPDIR/io.conductor.ConPilot.png"
        fi
        ln -sf "io.conductor.ConPilot.png" "$APPDIR/.DirIcon"

        # Bundle uv binary
        UV_TAR="appimage/tools/uv-{{.UV_VERSION}}-x86_64-unknown-linux-gnu.tar.gz"
        if [[ ! -f "$UV_TAR" ]]; then
          mkdir -p "appimage/tools"
          echo "Downloading uv {{.UV_VERSION}} for AppImage…"
          curl -fsSL -o "$UV_TAR" \
            "https://github.com/astral-sh/uv/releases/download/{{.UV_VERSION}}/uv-x86_64-unknown-linux-gnu.tar.gz"
        fi
        tar -xzf "$UV_TAR" --strip-components=1 -C "$APPDIR/usr/bin" \
          "uv-x86_64-unknown-linux-gnu/uv"
        chmod +x "$APPDIR/usr/bin/uv"

        # Wheels
        cp appimage/deps/*.whl "$APPDIR/usr/share/con-pilot/wheels/" 2>/dev/null || true
        cp appimage/deps/*.tar.gz "$APPDIR/usr/share/con-pilot/wheels/" 2>/dev/null || true

        echo "AppDir built at $APPDIR"

  appimage:build:
    desc: "Build the AppImage: deps → AppDir → appimagetool."
    dir: "{{.CON_PILOT_DIR}}"
    deps: [appimage:deps]
    cmds:
      - task: _appimage-appdir
      - |
        set -e
        mkdir -p appimage/tools dist

        TOOL="appimage/tools/appimagetool-x86_64.AppImage"
        if [[ ! -f "$TOOL" ]]; then
          echo "Downloading appimagetool ({{.APPIMAGETOOL_VERSION}})…"
          curl -fsSL -o "$TOOL" \
            "https://github.com/AppImage/AppImageKit/releases/download/{{.APPIMAGETOOL_VERSION}}/appimagetool-x86_64.AppImage"
          chmod +x "$TOOL"
        fi

        OUTPUT="dist/con-pilot-{{.VERSION}}-x86_64.AppImage"
        echo "Building AppImage → $OUTPUT"
        ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 "$TOOL" appimage/AppDir "$OUTPUT"
        chmod +x "$OUTPUT"
        echo "AppImage written to $OUTPUT"

  appimage:run:
    desc: "Run the built AppImage (pass extra args via CLI_ARGS)."
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - |
        OUTPUT="dist/con-pilot-{{.VERSION}}-x86_64.AppImage"
        if [[ ! -f "$OUTPUT" ]]; then
          echo "Error: AppImage not found at $OUTPUT — run 'task appimage:build' first."
          exit 1
        fi
        CONDUCTOR_HOME="{{.CONDUCTOR_HOME}}" "$OUTPUT" {{.CLI_ARGS}}

  appimage:clean:
    desc: Remove AppImage build artefacts (keeps deps and downloaded tools).
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - rm -rf appimage/AppDir dist/con-pilot-*-x86_64.AppImage

  appimage:clean:all:
    desc: Remove all AppImage artefacts including deps and downloaded tools.
    dir: "{{.CON_PILOT_DIR}}"
    cmds:
      - rm -rf appimage/AppDir appimage/deps appimage/tools dist/con-pilot-*-x86_64.AppImage

  appimage:
    desc: "Full AppImage pipeline: deps → build."
    cmds:
      - task: appimage:deps
      - task: appimage:build

  appimage:force:
    desc: "Clean all artefacts and rebuild from scratch."
    cmds:
      - task: appimage:clean:all
      - task: appimage:deps
      - task: appimage:build

  build:dev:
    desc: "Bump VERSION files to <X.Y.Z>-dev, run lint + tests against the dev environment, then restore VERSION files. No packaging."
    cmds:
      - |
        set -e
        # ── Bump VERSION files to -dev (with EXIT trap restoring them) ─────
        VERSION_FILES=(
          "{{.ROOT_DIR}}/src/python/con-pilot/VERSION"
          "{{.ROOT_DIR}}/src/conduct-cli/VERSION"
          "{{.ROOT_DIR}}/src/vscode/conduct-lectern/VERSION"
        )
        # The lectern Taskfile's `version:sync` step rewrites package.json
        # from its VERSION file, so we snapshot it for restore.
        SIDECAR_FILES=(
          "{{.ROOT_DIR}}/src/vscode/conduct-lectern/package.json"
        )

        BACKUP_DIR="$(mktemp -d)"
        : > "$BACKUP_DIR/.map"
        for vf in "${VERSION_FILES[@]}" "${SIDECAR_FILES[@]}"; do
          h="$(printf '%s' "$vf" | md5sum | awk '{print $1}')"
          cp -p "$vf" "$BACKUP_DIR/$h"
          printf '%s\t%s\n' "$vf" "$BACKUP_DIR/$h" >> "$BACKUP_DIR/.map"
        done

        restore_versions() {
          local rc=$?
          while IFS=$'\t' read -r vf backup; do
            [[ -f "$backup" ]] && cp -p "$backup" "$vf"
          done < "$BACKUP_DIR/.map"
          rm -rf "$BACKUP_DIR"
          echo "Restored VERSION files and version sidecars."
          return $rc
        }
        trap restore_versions EXIT

        echo "Bumping VERSION files for dev build:"
        for vf in "${VERSION_FILES[@]}"; do
          v="$(tr -d '[:space:]' < "$vf")"
          case "$v" in
            *-dev) ;;
            *) printf '%s-dev\n' "$v" > "$vf" ;;
          esac
          echo "  $(realpath --relative-to='{{.ROOT_DIR}}' "$vf") = $(cat "$vf")"
        done

        # Run the build steps as fresh `task` subprocesses so each one
        # re-reads VERSION files via its `sh:` vars. We do NOT export
        # CONDUCTOR_ENV here: the VERSION files have been bumped in place,
        # and exporting CONDUCTOR_ENV=-dev would make child `task` vars
        # look for nonexistent VERSION-dev sidecar files.
        task lint
        task test

  release:dev:
    desc: "Build a dev release: bump VERSION files to <X.Y.Z>-dev, build dev AppImage + vsix + setup.sh into releases/v[VERSION]-dev/, restore VERSION files. Skips lint/tests, release notes, history, and releases-details.json updates."
    cmds:
      - |
        set -e
        # ── Bump VERSION files to -dev (with EXIT trap restoring them) ─────
        VERSION_FILES=(
          "{{.ROOT_DIR}}/src/python/con-pilot/VERSION"
          "{{.ROOT_DIR}}/src/conduct-cli/VERSION"
          "{{.ROOT_DIR}}/src/vscode/conduct-lectern/VERSION"
        )
        # We deliberately do NOT touch pyproject.toml: PEP 440 would
        # normalize "0.4.0-dev" to "0.4.0.dev0" in the wheel metadata,
        # which is awkward to render and to revert. The dev runtime
        # obtains its "-dev" suffix purely from CONDUCTOR_ENV=DEV (set
        # by AppRun via the `dev` AppDir marker).
        SIDECAR_FILES=(
          "{{.ROOT_DIR}}/src/vscode/conduct-lectern/package.json"
        )

        BACKUP_DIR="$(mktemp -d)"
        : > "$BACKUP_DIR/.map"
        for vf in "${VERSION_FILES[@]}" "${SIDECAR_FILES[@]}"; do
          h="$(printf '%s' "$vf" | md5sum | awk '{print $1}')"
          cp -p "$vf" "$BACKUP_DIR/$h"
          printf '%s\t%s\n' "$vf" "$BACKUP_DIR/$h" >> "$BACKUP_DIR/.map"
        done

        restore_versions() {
          local rc=$?
          while IFS=$'\t' read -r vf backup; do
            [[ -f "$backup" ]] && cp -p "$backup" "$vf"
          done < "$BACKUP_DIR/.map"
          rm -rf "$BACKUP_DIR"
          echo "Restored VERSION files and version sidecars."
          return $rc
        }
        trap restore_versions EXIT

        echo "Bumping VERSION files for dev release:"
        for vf in "${VERSION_FILES[@]}"; do
          v="$(tr -d '[:space:]' < "$vf")"
          case "$v" in
            *-dev) ;;
            *) printf '%s-dev\n' "$v" > "$vf" ;;
          esac
          echo "  $(realpath --relative-to='{{.ROOT_DIR}}' "$vf") = $(cat "$vf")"
        done

        # Dev AppImages bundle the full `dev` dependency group (debugpy,
        # jupyter, pytest, ruff) so the resulting con-pilot install is
        # fully capable of running the dev tooling offline.
        # We do NOT export CONDUCTOR_ENV here: VERSION files are bumped in
        # place above, so child `task` subprocesses pick up the -dev suffix
        # by re-reading VERSION directly. Exporting CONDUCTOR_ENV=-dev
        # would make {{.VERSION}} resolve via VERSION-dev sidecar files
        # which do not exist, yielding an empty version string.
        CON_PILOT_INCLUDE_DEV=1 task appimage:build
        task lectern:package
        task release:package

        VERSION="$(cat '{{.ROOT_DIR}}/src/python/con-pilot/VERSION' | tr -d '[:space:]')"
        LECTERN_VERSION="$(cat '{{.ROOT_DIR}}/src/vscode/conduct-lectern/VERSION' | tr -d '[:space:]')"
        DEV_DIR="{{.ROOT_DIR}}/releases/v${VERSION}"
        mkdir -p "$DEV_DIR"

        # Copy artefacts (filenames already carry -dev because VERSION files were bumped).
        cp "{{.ROOT_DIR}}/dist/setup-${VERSION}.sh" "$DEV_DIR/setup-${VERSION}.sh"
        DEV_APPIMAGE="$DEV_DIR/con-pilot-${VERSION}-x86_64.AppImage"
        cp "{{.CON_PILOT_DIR}}/dist/con-pilot-${VERSION}-x86_64.AppImage" "$DEV_APPIMAGE"

        # Mark this AppImage as a dev build. The bundled AppRun detects the
        # `dev` marker file at AppDir root and exports CONDUCTOR_ENV=DEV at
        # runtime, which makes con-pilot return the null-GUID admin key
        # without persisting any key file.
        NULL_KEY="00000000-0000-0000-0000-000000000000"
        TMPDIR_DEV="$(mktemp -d)"
        trap 'restore_versions; rm -rf "$TMPDIR_DEV"' EXIT
        (
          cd "$TMPDIR_DEV"
          "$DEV_APPIMAGE" --appimage-extract >/dev/null
        )
        APPDIR_DEV="$TMPDIR_DEV/squashfs-root"
        printf 'dev build\n' > "$APPDIR_DEV/dev"
        chmod 644 "$APPDIR_DEV/dev"
        TOOL="{{.CON_PILOT_DIR}}/appimage/tools/appimagetool-x86_64.AppImage"
        ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 "$TOOL" "$APPDIR_DEV" "$DEV_APPIMAGE" >/dev/null
        chmod +x "$DEV_APPIMAGE"
        echo "Marked dev AppImage (CONDUCTOR_ENV=DEV at runtime, admin key: $NULL_KEY)."

        # The vsix is written by lectern:package under releases/v${VERSION}/.
        VSIX_SRC="{{.ROOT_DIR}}/releases/v${VERSION}/conduct-lectern-${LECTERN_VERSION}.vsix"
        if [[ -f "$VSIX_SRC" && "$VSIX_SRC" != "$DEV_DIR/conduct-lectern-${LECTERN_VERSION}.vsix" ]]; then
          cp "$VSIX_SRC" "$DEV_DIR/conduct-lectern-${LECTERN_VERSION}.vsix"
        fi

        # Ensure the dev folder is git-ignored inside the releases submodule.
        GITIGNORE="{{.ROOT_DIR}}/releases/.gitignore"
        ENTRY="v${VERSION}/"
        touch "$GITIGNORE"
        grep -qxF "$ENTRY" "$GITIGNORE" || echo "$ENTRY" >> "$GITIGNORE"

        echo ""
        echo "Dev release v${VERSION} artefacts:"
        find "$DEV_DIR" -mindepth 1 -maxdepth 1 -type f -printf '  %p\n' | sort
        echo ""
        echo "(Skipped: release-notes, release-history.md, releases-details.json)"
        echo "To install the dev build into CONDUCTOR_HOME, run:  task install:dev"

  install:dev:
    desc: "Install the most recent dev AppImage from releases/v*-dev/ into CONDUCTOR_HOME and restart the service."
    cmds:
      - task: _install-env
      - |
        set -e
        # Locate the most recent dev AppImage built under releases/v*-dev/.
        DEV_APPIMAGE="$(ls -1t {{.ROOT_DIR}}/releases/v*-dev/con-pilot-*-x86_64.AppImage 2>/dev/null | head -n 1 || true)"
        if [[ -z "$DEV_APPIMAGE" ]]; then
          echo "Error: no dev AppImage found under releases/v*-dev/."
          echo "Build one first with:  task release:dev"
          exit 1
        fi
        echo "Installing dev AppImage: $DEV_APPIMAGE"

        DEST="{{.CONDUCTOR_HOME}}/con-pilot.AppImage"
        mkdir -p "{{.CONDUCTOR_HOME}}"

        # Stop any running service so the file can be replaced cleanly.
        if pgrep -f 'con-pilot serve' >/dev/null 2>&1; then
          pkill -f 'con-pilot serve' || true
          sleep 1
          echo "Stopped running con-pilot serve process."
        fi

        cp "$DEV_APPIMAGE" "$DEST"
        chmod +x "$DEST"
        # Dev builds use the null-GUID admin key, so no host-side key file.
        rm -f "{{.CONDUCTOR_HOME}}/key"
        echo "Installed dev AppImage to $DEST."

        # Start the service and wait for /health.
        LOG="{{.CONDUCTOR_HOME}}/con-pilot.log"
        if [[ -n "${SENTRY_DSN:-}" ]]; then
          echo "Sentry: SENTRY_DSN detected — forwarding to dev AppImage."
        else
          echo "Sentry: SENTRY_DSN not set — error reporting disabled."
        fi
        CON_PILOT_DEV_SHOW_ME=1 setsid "$DEST" serve >> "$LOG" 2>&1 &
        API_PREFIX="/${CON_PILOT_API_BASE:-api}/${CON_PILOT_API_VERSION:-v1}"
        HEALTH_URL="http://{{.CON_PILOT_HOST}}:{{.CON_PILOT_PORT}}${API_PREFIX}/health"
        echo "Waiting for $HEALTH_URL …"
        for i in $(seq 1 20); do
          if curl -sf "$HEALTH_URL" >/dev/null 2>&1; then
            echo "Health check passed."
            break
          fi
          sleep 1
        done
        if ! curl -sf "$HEALTH_URL" >/dev/null 2>&1; then
          echo "Error: con-pilot did not become healthy after 20s. Check $LOG"
          exit 1
        fi

        echo ""
        "{{.ROOT_DIR}}/conduct" version
        "{{.ROOT_DIR}}/conduct" status

  # ── Release ─────────────────────────────────────────────────────────────────

  release:bump:
    desc: Bump the patch version of con-pilot (the bundled release version). Syncs pyproject.toml automatically.
    cmds:
      - |
        V="$(cat '{{.ROOT_DIR}}/src/python/con-pilot/VERSION' | tr -d '[:space:]')"
        MAJOR="${V%%.*}"
        REST="${V#*.}"
        MINOR="${REST%%.*}"
        PATCH="${REST#*.}"
        NEW_PATCH=$((PATCH + 1))
        NEW_V="${MAJOR}.${MINOR}.${NEW_PATCH}"
        printf '%s\n' "$NEW_V" > "{{.ROOT_DIR}}/src/python/con-pilot/VERSION"
        sed -i "s/^version = \".*\"/version = \"${NEW_V}\"/" "{{.ROOT_DIR}}/src/python/con-pilot/pyproject.toml"
        echo "Version bumped: ${V} → ${NEW_V}"
        echo "Updated: src/python/con-pilot/VERSION and src/python/con-pilot/pyproject.toml"

  release:package:
    desc: Package minimal deployment into a self-extracting setup.sh.
    cmds:
      - |
        set -e
        VERSION="$(cat '{{.ROOT_DIR}}/src/python/con-pilot/VERSION' | tr -d '[:space:]')"
        CONDUCTOR_CLI_VERSION="$(cat '{{.ROOT_DIR}}/src/conduct-cli/VERSION' | tr -d '[:space:]')"
        BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        DIST_DIR="{{.ROOT_DIR}}/dist"
        mkdir -p "$DIST_DIR"

        echo "Packaging Conductor v${VERSION} (conductor-cli v${CONDUCTOR_CLI_VERSION})…"

        # Strip "Running the tests" section from README for deployment
        DEPLOY_README="$(mktemp)"
        sed '/^## Running the tests/,$d' "{{.ROOT_DIR}}/README.md" > "$DEPLOY_README"
        sed -i '${/^---$/d;}' "$DEPLOY_README"

        # Create payload tarball with only essential files
        PAYLOAD="$(mktemp)"
        STAGING="$(mktemp -d)"
        mkdir -p "$STAGING/conductor"

        cp "{{.ROOT_DIR}}/conduct"              "$STAGING/conductor/"
        cp "{{.ROOT_DIR}}/conduct.bash-completion" "$STAGING/conductor/"
        # Note: VERSION file is intentionally NOT deployed into CONDUCTOR_HOME.
        # The runtime version is sourced from the running service via /version.
        cp "$DEPLOY_README"                     "$STAGING/conductor/README.md"
        cp "{{.ROOT_DIR}}/src/conduct-cli/uninstall-conductor.sh"         "$STAGING/conductor/"
        cp "{{.ROOT_DIR}}/conductor.yaml"       "$STAGING/conductor/"
        cp "{{.CON_PILOT_DIR}}/dist/con-pilot-${VERSION}-x86_64.AppImage" "$STAGING/conductor/con-pilot.AppImage"
        rsync -a --exclude='.not-deployed' "{{.ROOT_DIR}}/.github/" "$STAGING/conductor/.github/"

        tar czf "$PAYLOAD" -C "$STAGING" conductor
        rm -rf "$STAGING" "$DEPLOY_README"

        # Build setup.sh = header (with inlined shared functions + substitutions) + archive payload
        SETUP="${DIST_DIR}/setup-${VERSION}.sh"
        # CP_VERSION is the same as VERSION since the bundled release is pegged to con-pilot
        CP_VERSION="${VERSION}"
        TMPHEADER="$(mktemp)"
        while IFS= read -r line; do
          if [[ "$line" == "# __FUNCTIONS__" ]]; then
            cat '{{.ROOT_DIR}}/src/conduct-cli/setup.sh.functions'
          else
            printf '%s\n' "$line"
          fi
        done < '{{.ROOT_DIR}}/src/conduct-cli/setup.sh.header' > "$TMPHEADER"
        sed \
          -e "s|__VERSION__|${VERSION}|g" \
          -e "s|__CON_PILOT_VERSION__|${CP_VERSION}|g" \
          -e "s|__CONDUCTOR_CLI_VERSION__|${CONDUCTOR_CLI_VERSION}|g" \
          -e "s|__BUILD_DATE__|${BUILD_DATE}|g" \
          "$TMPHEADER" > "$SETUP"
        rm -f "$TMPHEADER"
        cat "$PAYLOAD" >> "$SETUP"
        chmod +x "$SETUP"
        rm -f "$PAYLOAD"

        SIZE="$(du -h "$SETUP" | cut -f1)"
        echo "Created ${SETUP} (${SIZE})"

  release:package:deps-bundled:
    desc: Package full Flatpak bundle with offline dependencies into setup-VERSION-full-bundle.sh.
    cmds:
      - |
        set -e
        VERSION="$(cat '{{.ROOT_DIR}}/src/python/con-pilot/VERSION' | tr -d '[:space:]')"
        CONDUCTOR_CLI_VERSION="$(cat '{{.ROOT_DIR}}/src/conduct-cli/VERSION' | tr -d '[:space:]')"
        BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        DIST_DIR="{{.ROOT_DIR}}/dist"
        mkdir -p "$DIST_DIR"

        echo "Packaging Conductor v${VERSION} (full offline bundle)…"

        # Strip "Running the tests" section from README for deployment
        DEPLOY_README="$(mktemp)"
        sed '/^## Running the tests/,$d' "{{.ROOT_DIR}}/README.md" > "$DEPLOY_README"
        sed -i '${/^---$/d;}' "$DEPLOY_README"

        # Create payload tarball with essential files AND offline dependencies
        PAYLOAD="$(mktemp)"
        STAGING="$(mktemp -d)"
        mkdir -p "$STAGING/conductor/python/con-pilot/dist/offline"

        cp "{{.ROOT_DIR}}/conduct"              "$STAGING/conductor/"
        cp "{{.ROOT_DIR}}/conduct.bash-completion" "$STAGING/conductor/"
        # Note: VERSION file is intentionally NOT deployed into CONDUCTOR_HOME.
        # The runtime version is sourced from the running service via /version.
        cp "$DEPLOY_README"                     "$STAGING/conductor/README.md"
        cp "{{.ROOT_DIR}}/src/conduct-cli/uninstall-conductor.sh" "$STAGING/conductor/"
        cp "{{.ROOT_DIR}}/conductor.yaml"       "$STAGING/conductor/"
        cp "{{.CON_PILOT_DIR}}/dist/io.conductor.ConPilot.flatpak" "$STAGING/conductor/python/con-pilot/dist/"

        # Include offline dependencies (Platform, Sdk, uv)
        cp "{{.CON_PILOT_DIR}}/dist/offline/"* "$STAGING/conductor/python/con-pilot/dist/offline/"

        tar czf "$PAYLOAD" -C "$STAGING" conductor
        rm -rf "$STAGING" "$DEPLOY_README"

        # Build setup.sh = header.full (with inlined shared functions + substitutions) + archive payload
        SETUP="${DIST_DIR}/setup-${VERSION}-full-bundle.sh"
        CP_VERSION=$(grep -m1 '^version' '{{.CON_PILOT_DIR}}/pyproject.toml' | sed 's/.*"\(.*\)"/\1/')
        TMPHEADER="$(mktemp)"
        while IFS= read -r line; do
          if [[ "$line" == "# __FUNCTIONS__" ]]; then
            cat '{{.ROOT_DIR}}/src/conduct-cli/setup.sh.functions'
          else
            printf '%s\n' "$line"
          fi
        done < '{{.ROOT_DIR}}/src/conduct-cli/setup.sh.header.full' > "$TMPHEADER"
        sed \
          -e "s|__VERSION__|${VERSION}|g" \
          -e "s|__CON_PILOT_VERSION__|${CP_VERSION}|g" \
          -e "s|__CONDUCTOR_CLI_VERSION__|${CONDUCTOR_CLI_VERSION}|g" \
          -e "s|__BUILD_DATE__|${BUILD_DATE}|g" \
          -e "s|__RUNTIME_VERSION__|{{.RUNTIME_VERSION}}|g" \
          -e "s|__UV_VERSION__|{{.UV_VERSION}}|g" \
          "$TMPHEADER" > "$SETUP"
        rm -f "$TMPHEADER"
        cat "$PAYLOAD" >> "$SETUP"
        chmod +x "$SETUP"
        rm -f "$PAYLOAD"

        SIZE="$(du -h "$SETUP" | cut -f1)"
        echo "Created ${SETUP} (${SIZE})"
        echo "Includes offline dependencies: Platform, Sdk, uv"

  release:
    desc: "Build setup file, vsix, create releases/v[version]/ directory, and generate release notes."
    cmds:
      - task: appimage:build
      - task: lectern:package
      - task: release:package
      - |
        set -e
        VERSION="$(cat '{{.ROOT_DIR}}/src/python/con-pilot/VERSION' | tr -d '[:space:]')"
        CONDUCTOR_CLI_VERSION="$(cat '{{.ROOT_DIR}}/src/conduct-cli/VERSION' | tr -d '[:space:]')"
        CONDUCTOR_HOME_VERSION="$(cat '{{.ROOT_DIR}}/src/vscode/conduct-lectern/VERSION' 2>/dev/null | tr -d '[:space:]' || echo '0.0.0')"
        RELEASES_DIR="{{.ROOT_DIR}}/releases/v${VERSION}"
        mkdir -p "$RELEASES_DIR"

        # Copy setup file to versioned releases folder
        cp "{{.ROOT_DIR}}/dist/setup-${VERSION}.sh" "$RELEASES_DIR/"

        # Generate release notes from template
        RELEASE_DATE="$(date '+%B %d, %Y')"
        NOTES_FILE="$RELEASES_DIR/release-notes-${VERSION}.md"
        TEMPLATE="{{.ROOT_DIR}}/src/conduct-cli/release-notes.template.md"

        sed -e "s/__VERSION__/${VERSION}/g" \
            -e "s/__RELEASE_DATE__/${RELEASE_DATE}/g" \
            "$TEMPLATE" > "$NOTES_FILE"

        # Update releases-details.json
        DETAILS_FILE="{{.ROOT_DIR}}/releases/releases-details.json"
        ENTRY="{\"conduct-cli\": \"${CONDUCTOR_CLI_VERSION}\", \"con-pilot\": \"${VERSION}\", \"conduct-lectern\": \"${CONDUCTOR_HOME_VERSION}\"}"
        jq --arg key "v${VERSION}" --argjson val "$(echo $ENTRY)" '. + {($key): $val}' "$DETAILS_FILE" > "${DETAILS_FILE}.tmp"
        mv "${DETAILS_FILE}.tmp" "$DETAILS_FILE"
        echo "Updated releases-details.json for v${VERSION}"

        echo ""
        echo "Release v${VERSION} artifacts saved to releases/v${VERSION}/:"
        ls -lh "$RELEASES_DIR/"
        echo ""
        echo "NOTE: Edit $NOTES_FILE to add version-specific changes."

  # ── Submodule Management ─────────────────────────────────────────────────────

  submodule:init:
    desc: "Register and checkout the releases submodule if it is not yet initialised."
    cmds:
      - |
        set -e
        RELEASES="{{.ROOT_DIR}}/releases"
        if [ ! -f "$RELEASES/.git" ]; then
          echo "Initialising releases submodule…"
          git -C "{{.ROOT_DIR}}" submodule update --init --recursive releases
        else
          echo "Submodule already initialised ($(git -C "$RELEASES" rev-parse --short HEAD 2>/dev/null))."
        fi

  submodule:sync:
    desc: "Pull the latest commits from the releases submodule remote (fast-forward only)."
    deps: [submodule:init]
    cmds:
      - |
        set -e
        RELEASES="{{.ROOT_DIR}}/releases"
        echo "Syncing releases submodule…"
        git -C "{{.ROOT_DIR}}" submodule update --remote --merge releases
        echo "Submodule now at $(git -C "$RELEASES" rev-parse --short HEAD)."

  submodule:reset:
    desc: "Reset the releases submodule to the commit recorded in the parent repo (discard local changes)."
    deps: [submodule:init]
    cmds:
      - |
        set -e
        RELEASES="{{.ROOT_DIR}}/releases"
        echo "Resetting releases submodule to parent-recorded commit…"
        git -C "{{.ROOT_DIR}}" submodule update --init --force releases
        echo "Reset to $(git -C "$RELEASES" rev-parse --short HEAD)."

  submodule:status:
    desc: "Show the current state of the releases submodule."
    cmds:
      - git -C "{{.ROOT_DIR}}" submodule status releases
