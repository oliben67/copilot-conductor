version: "3"

vars:
  EXT_DIR: "{{.ROOT_DIR}}"
  WORKSPACE_ROOT:
    sh: git -C "{{.ROOT_DIR}}" rev-parse --show-toplevel
  RELEASES_DIR: "{{.WORKSPACE_ROOT}}/releases"
  VERSION:
    sh: cat "{{.EXT_DIR}}/VERSION" | tr -d '[:space:]'
  VSIX_NAME: "conduct-lectern-{{.VERSION}}.vsix"
  VERSIONED_DIR: "{{.RELEASES_DIR}}/v{{.VERSION}}"
  VSIX_PATH: "{{.VERSIONED_DIR}}/{{.VSIX_NAME}}"

tasks:
  # ── Dependencies ────────────────────────────────────────────────────────────

  install:
    desc: Install all npm dependencies (including dev).
    cmds:
      - npm ci
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json

  # ── Code Quality ────────────────────────────────────────────────────────────

  lint:
    desc: Check source files with ESLint.
    cmds:
      - npm run lint

  lint:fix:
    desc: Auto-fix ESLint issues in source files.
    cmds:
      - npm run lint:fix

  typecheck:
    desc: Run TypeScript type-checking without emitting output.
    cmds:
      - npm run compile:check

  check:
    desc: Run type-checking and linting (no side-effects, exits non-zero on issues).
    cmds:
      - task: typecheck
      - task: lint

  # ── Tests ───────────────────────────────────────────────────────────────────

  test:unit:
    desc: Run unit tests with Vitest.
    cmds:
      - npm run test:unit

  test:unit:watch:
    desc: Re-run unit tests on file changes.
    cmds:
      - npm run test:unit:watch

  test:integration:
    desc: |
      Run VS Code integration tests.
      NOTE: VS Code must NOT be running when this task executes. Close all VS Code
      windows before running, or run this in a fresh CI environment.
    cmds:
      - npm run test:integration

  test:
    desc: Run the full quality gate — typecheck, lint, unit tests, and integration tests.
    cmds:
      - task: typecheck
      - task: lint
      - task: test:unit
      - task: test:integration

  test:ci:
    desc: CI-safe quality gate — typecheck, lint, and unit tests only (no VS Code required).
    cmds:
      - task: typecheck
      - task: lint
      - task: test:unit

  # ── Build ───────────────────────────────────────────────────────────────────

  compile:
    desc: Compile TypeScript source to dist/.
    cmds:
      - npm run compile
    sources:
      - src/**/*.ts
      - tsconfig.json
    generates:
      - dist/**/*.js

  build:
    desc: Clean dist/ then compile from scratch.
    cmds:
      - npm run build

  clean:
    desc: Remove compiled output and any packaged .vsix files from releases/.
    cmds:
      - npm run clean

  # ── Package ─────────────────────────────────────────────────────────────────

  version:sync:
    desc: Sync the VERSION file into package.json so vsce picks up the right version.
    cmds:
      - |
        set -e
        VERSION="$(cat '{{.EXT_DIR}}/VERSION' | tr -d '[:space:]')"
        node -e "
          const fs = require('fs');
          const p = require('{{.EXT_DIR}}/package.json');
          p.version = process.argv[1];
          fs.writeFileSync('{{.EXT_DIR}}/package.json', JSON.stringify(p, null, 2) + '\n');
          console.log('package.json version set to ' + process.argv[1]);
        " "$VERSION"

  package:
    desc: Build and package the extension as a .vsix into releases/vX.Y.Z/.
    deps: [submodule:init, version:sync]
    cmds:
      - mkdir -p {{.VERSIONED_DIR}}
      - task: build
      - node_modules/.bin/vsce package --out {{.VERSIONED_DIR}}/
    generates:
      - "{{.VSIX_PATH}}"

  # ── Deploy ──────────────────────────────────────────────────────────────────

  deploy:
    desc: Install the packaged .vsix into the local VS Code instance.
    deps: [package]
    cmds:
      - code --install-extension {{.VSIX_PATH}}

  deploy:force:
    desc: Re-package and force-reinstall the extension (useful during development).
    cmds:
      - task: clean
      - task: package
      - code --install-extension {{.VSIX_PATH}} --force

  # ── Release Push ────────────────────────────────────────────────────────────

  release:push:
    desc: |
      Commit and push the current VSIX to copilot-conductor-releases.
      README.md is a local symlink to the root README; this task replaces it
      with a real copy before committing, pushes, then restores the symlink.
    deps: [package]
    cmds:
      - |
        set -e
        RELEASES="{{.RELEASES_DIR}}"
        ROOT_README="{{.WORKSPACE_ROOT}}/README.md"
        cd "$RELEASES"

        # Replace symlink with a real copy for the commit
        rm -f README.md
        cp "$ROOT_README" README.md

        git add -A
        git commit -m "Release conduct-lectern {{.VERSION}}" || echo "Nothing new to commit"
        git push origin main

        # Restore the symlink locally
        rm README.md
        ln -s ../README.md README.md
      - |
        # Update the submodule pointer in the parent repo
        git -C "{{.WORKSPACE_ROOT}}" add releases
        git -C "{{.WORKSPACE_ROOT}}" diff --cached --quiet releases || \
          git -C "{{.WORKSPACE_ROOT}}" commit -m "chore: update conduct-lectern releases submodule to {{.VERSION}}"

  # ── Submodule Management ─────────────────────────────────────────────────────

  submodule:init:
    desc: "Init the releases submodule in the workspace root (if not yet done)."
    cmds:
      - |
        set -e
        RELEASES="{{.WORKSPACE_ROOT}}/releases"
        if [ ! -f "$RELEASES/.git" ]; then
          echo "Initialising releases submodule…"
          git -C "{{.WORKSPACE_ROOT}}" submodule update --init --recursive releases
        else
          echo "Submodule already initialised ($(git -C "$RELEASES" rev-parse --short HEAD 2>/dev/null))."
        fi

  submodule:sync:
    desc: "Pull the latest commits from the releases submodule remote."
    deps: [submodule:init]
    cmds:
      - |
        set -e
        echo "Syncing releases submodule…"
        git -C "{{.WORKSPACE_ROOT}}" submodule update --remote --merge releases
        echo "Submodule now at $(git -C "{{.WORKSPACE_ROOT}}/releases" rev-parse --short HEAD)."

  submodule:reset:
    desc: "Reset releases submodule to the commit recorded in the parent repo."
    deps: [submodule:init]
    cmds:
      - |
        set -e
        echo "Resetting releases submodule to parent-recorded commit…"
        git -C "{{.WORKSPACE_ROOT}}" submodule update --init --force releases
        echo "Reset to $(git -C "{{.WORKSPACE_ROOT}}/releases" rev-parse --short HEAD)."

  submodule:status:
    desc: "Show the current state of the releases submodule."
    cmds:
      - git -C "{{.WORKSPACE_ROOT}}" submodule status releases

  # ── CI ──────────────────────────────────────────────────────────────────────

  ci:
    desc: |
      CI pipeline — install, typecheck, lint, unit tests, and package.
      Integration tests are excluded; run 'task test:integration' separately
      when VS Code is NOT running.
    cmds:
      - task: install
      - task: check
      - task: test:unit
      - task: package
