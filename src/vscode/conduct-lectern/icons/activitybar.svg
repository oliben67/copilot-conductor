    d="M3 1a2 2 0 0 0-2 2v18a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2H3zm17 2.5H4A.5.5 0 0 0 3.5 4v16a.5.5 0 0 0 .5.5h16a.5.5 0 0 0 .5-.5V4a.5.5 0 0 0-.5-.5z"/>
  <!-- Magic wand shaft (diagonal, bottom-left → top-right) -->
