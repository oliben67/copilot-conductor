version: "3"

vars:
  VENV: "{{.ROOT_DIR}}/.venv"
  CON_PILOT: "{{.VENV}}/bin/con-pilot"
  PYTHON: "{{.VENV}}/bin/python"
  CONDUCTOR_HOME:
    sh: echo "${CONDUCTOR_HOME:-/home/scor/.conductor}"

env:
  CONDUCTOR_HOME: "{{.CONDUCTOR_HOME}}"

tasks:
  # ── Dependencies ────────────────────────────────────────────────────────────

  build:
    desc: Run install + tests for con-pilot.
    cmds:
      - task: install
      - task: test

  install:
    desc: Install all dependencies (including dev) into the venv.
    cmds:
      - uv sync --all-groups
    sources:
      - pyproject.toml
      - uv.lock
    generates:
      - "{{.VENV}}/bin/con-pilot"

  # ── Code quality ────────────────────────────────────────────────────────────

  fmt:
    desc: Format source files with ruff.
    cmds:
      - "uv run ruff format src/ tests/ --verbose"

  lint:
    desc: Check code style and auto-fix safe issues with ruff.
    cmds:
      - "uv run ruff check --fix src/ tests/ --verbose"

  check:
    desc: Run formatter + linter (no side-effects, exits non-zero on issues).
    cmds:
      - "uv run ruff format --check src/ tests/ --verbose"
      - "uv run ruff check src/ tests/ --verbose"

  # ── Tests ───────────────────────────────────────────────────────────────────

  test:
    desc: Run the full test suite with pytest.
    cmds:
      - "{{.PYTHON}} -m pytest {{.CLI_ARGS}}"

  test:cov:
    desc: Run tests with coverage report.
    cmds:
      - "{{.PYTHON}} -m pytest --cov=con_pilot --cov-report=term-missing {{.CLI_ARGS}}"

  test:watch:
    desc: Re-run tests on every file change (requires pytest-watch).
    cmds:
      - "{{.PYTHON}} -m ptw -- {{.CLI_ARGS}}"

  # ── Run ─────────────────────────────────────────────────────────────────────

  debug:
    desc: Start con-pilot in debug mode (uvicorn --reload, log-level debug).
    cmds:
      - >-
        "{{.VENV}}/bin/uvicorn"
        con_pilot.server:create_app
        --host ${CON_PILOT_HOST:-localhost}
        --port ${CON_PILOT_PORT:-8000}
        --reload
        --log-level debug
        --factory

  start:
    desc: Start con-pilot in production mode via con-pilot serve.
    cmds:
      - "CON_PILOT_DEV_SHOW_ME=1 {{.CON_PILOT}} serve {{.CLI_ARGS}}"
