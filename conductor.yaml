version:
  number: "1.0.0"
  description: Initial YAML configuration with cron and version support
  date: "2026-04-18T10:36:10+02:00"
  notes: Migrated from JSON format, added CronConfig and VersionConfig models

models:
  authorized_models:
    - gpt-4o
    - gpt-4o-mini
    - gpt-4.1
    - gpt-4.1-mini
    - gpt-4.1-nano
    - o1
    - o1-mini
    - o3
    - o3-mini
    - o4
    - o4-mini
    - claude-3.5-sonnet
    - claude-3-5-haiku
    - claude-3-7-sonnet
    - claude-haiku-4.5
    - claude-sonnet-4
    - claude-sonnet-4.5
    - claude-sonnet-4.6
    - claude-opus-4
    - claude-opus-4.5
    - claude-opus-4.6
    - gemini-2
  default_model: claude-opus-4.6

agent:
  conductor:
    name: uppity
    description: >-
      The conductor agent is responsible for orchestrating the execution of tasks
      and managing the overall workflow. It coordinates the interactions between
      different agents, ensuring that tasks are executed in the correct order and
      that resources are allocated efficiently. The conductor agent monitors the
      progress of tasks, handles any issues that arise, and makes decisions to
      optimize the workflow based on the current state of the system.
    active: true
    model: claude-opus-4.6
    scope: system
    # Conductor has all permissions by default - no explicit permissions needed

  git:
    name: cheery-git
    description: >-
      Manages version control operations including commits, branches, merges,
      and pull requests.
    active: true
    model: claude-opus-4.6
    scope: project
    permissions:
      - git_commit
      - git_branch
      - git_push
      - git_merge
      - git_pr_create
      - git_pr_review
      - terminal_execute
      - agent_invoke

  reviewer:
    name: nosy-parker-[scope:project]
    description: >-
      Reviews code changes and provides feedback on pull requests.
    active: true
    model: claude-opus-4.6
    scope: project
    permissions:
      - git_pr_review
      - agent_invoke

  support:
    name: dogsbody-[scope:system]-[rank]
    description: >-
      The agent responsible for handling miscellaneous tasks and supporting other
      agents in their operations. This agent will assist with various duties,
      ensuring that the workflow remains smooth and efficient.
    active: true
    model: claude-opus-4.6
    scope: system
    permissions:
      - file_create
      - file_modify
      - terminal_execute
      - git_commit
      - agent_invoke
    instances:
      min: 1
      max: 2

  developer:
    name: code-monkey-[scope:project]-agent-[rank]
    description: >-
      The agent responsible for the production of code, including the
      implementation of features, bug fixes, and other development tasks. This
      agent will work on coding assignments, ensuring that the code is
      functional, efficient, and adheres to project standards.
    active: true
    sidekick: true
    model: claude-opus-4.6
    scope: project
    instructions: >-
      Follow the session setup defined in `$CONDUCTOR_HOME/.github/copilot-instructions.md`.
      Respect `TRUSTED_DIRECTORIES` — do not operate outside them without explicit
      user confirmation. Use the model specified in `COPILOT_DEFAULT_MODEL` unless
      the user overrides it. For destructive or irreversible actions, always ask
      before proceeding.
    instances:
      min: 1
      max: 2
    permissions:
      - file_create
      - file_modify
      - terminal_execute
      - git_commit
      - git_branch
      - git_pr_create
      - agent_invoke

  agile:
    name: wool-gatherer-[scope:project]
    description: >-
      The agent responsible for managing agile processes, including sprint
      planning, task prioritization, and progress tracking. This agent will
      ensure that the team follows agile methodologies and that projects are
      delivered on time and within scope.
    active: true
    model: claude-opus-4.6
    scope: project
    permissions:
      - file_create
      - file_modify
      - git_commit
      - git_pr_review
      - agent_invoke

  tester:
    name: guy-fawkes-[scope:project]-[rank]
    description: >-
      The agent responsible for testing code, including unit tests, integration
      tests, and other quality assurance tasks. This agent will ensure that the
      code is reliable, functional, and meets project standards.
    active: true
    model: claude-opus-4.6
    scope: project
    instances:
      min: 1
      max: 2
    permissions:
      - file_create
      - file_modify
      - terminal_execute
      - terminal_background
      - git_commit
      - agent_invoke

  arbitrator:
    name: sir
    description: >-
      Resolves conflicts and makes decisions when there are disagreements
      between other agents.
    active: true
    model: claude-opus-4.6
    scope: system
    permissions:
      - agent_invoke
      - agent_manage

tasks:
  - name: git-sync
    agent: git
    description: Sync local repository with remote
    instructions: >-
      Pull latest changes from remote, resolve any conflicts if possible,
      and push local commits. Report any merge conflicts to the conductor.
    permissions:
      - workspace_read
      - codebase_context
      - git_read
      - git_commit
      - git_branch
      - git_push
      - git_merge
      - agent_invoke
      - require_approval_destructive
      - trusted_directories_only

  - name: pr-review
    agent: reviewer
    description: Review open pull requests
    instructions: >-
      Review all open pull requests in the project. Analyze code for potential
      issues, suggest improvements, and ensure coding standards are maintained.
      Post review comments and approve or request changes as appropriate.
    cron: "0 9,17 * * *"
    create_on_ping: true
    permissions:
      - workspace_read
      - codebase_context
      - git_read
      - git_pr_review
      - agent_invoke
      - require_approval_destructive
      - trusted_directories_only

  - name: agent-health-check
    agent: conductor
    description: Check the health of all other agents defined in the configuration
    instructions: >-
      Iterate over every agent defined in conductor.yaml (excluding the
      conductor itself). For each active agent, verify that it is reachable
      and responsive, confirm its configured model is authorized, and record
      any unhealthy or unresponsive agents. Write a summary report to
      `$CONDUCTOR_HOME/reports/agent-health-check-<UTC-timestamp>.md`
      (create the `reports/` directory if missing) noting the status of each
      agent and escalate persistent failures.
    cron: "*/5 * * * *"
    permissions:
      - workspace_read
      - codebase_context
      - agent_invoke
      - agent_manage
      - file_create
      - file_modify
